<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lobedron Hub</title>
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@300;500;700;800&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg-color: #050505;
            --text-color: #ffffff;
            --text-muted: #888888;
            --card-bg: rgba(20, 20, 20, 0.6);
            --border-color: rgba(255, 255, 255, 0.08);
            --accent-glow: rgba(255, 255, 255, 0.15); /* ВЕРНУЛ СВЕЧЕНИЕ */
            --theme-transition: 0.5s ease;
        }

        [data-theme="light"] {
            --bg-color: #e5e5e5;
            --text-color: #111111;
            --text-muted: #555555;
            --card-bg: rgba(255, 255, 255, 0.6);
            --border-color: rgba(0, 0, 0, 0.1);
            --accent-glow: rgba(0, 0, 0, 0.15);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Manrope', sans-serif; }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            overflow: hidden;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: background-color var(--theme-transition), color var(--theme-transition);
        }

        /* ВЕРНУЛ ДОЖДЬ ИЗ ПЕРВОЙ ВЕРСИИ */
        #rainCanvas {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: 0; pointer-events: none; opacity: 0.4;
        }

        .container {
            position: relative;
            z-index: 1;
            width: 100%;
            max-width: 900px;
            padding: 40px 20px;
            animation: fadeIn 1.2s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .header { text-align: center; margin-bottom: 60px; }
        .header h1 { font-size: 2.8rem; font-weight: 800; letter-spacing: -1.5px; margin-bottom: 8px; }
        .header p { color: var(--text-muted); font-size: 0.85rem; text-transform: uppercase; letter-spacing: 3px; }

        .projects-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
            gap: 25px;
        }

        .project-card {
            background: var(--card-bg);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid var(--border-color);
            border-radius: 28px;
            padding: 35px;
            text-decoration: none;
            color: var(--text-color);
            transition: all 0.4s cubic-bezier(0.25, 1, 0.5, 1);
            display: flex;
            flex-direction: column;
            gap: 15px;
            position: relative; /* ДЛЯ СВЕЧЕНИЯ */
            overflow: hidden;
        }

        /* ВЕРНУЛ ЭФФЕКТ СВЕЧЕНИЯ ПРИ НАВЕДЕНИИ */
        .project-card::before {
            content: '';
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle at 50% 0%, var(--accent-glow) 0%, transparent 60%);
            opacity: 0;
            transition: opacity 0.4s ease;
        }

        .project-card:hover {
            transform: translateY(-8px);
            border-color: rgba(255, 255, 255, 0.2);
            box-shadow: 0 15px 35px rgba(0,0,0,0.4);
        }

        .project-card:hover::before {
            opacity: 1;
        }

        .project-card h2 { font-size: 1.5rem; font-weight: 700; z-index: 1; }
        .project-card p { color: var(--text-muted); font-size: 0.95rem; line-height: 1.6; z-index: 1; flex-grow: 1; }

        /* Панель управления */
        .controls-bar {
            position: fixed;
            bottom: 40px;
            display: flex;
            align-items: center;
            gap: 20px;
            background: var(--card-bg);
            backdrop-filter: blur(25px);
            padding: 12px 25px;
            border-radius: 100px;
            border: 1px solid var(--border-color);
            z-index: 100;
        }

        /* Белая минималистичная кнопка звука */
        .mute-btn {
            width: 35px;
            height: 35px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: 0.3s;
            border-radius: 50%;
        }

        .mute-btn svg, .theme-btn svg {
            fill: var(--text-color);
            width: 18px;
            height: 18px;
            transition: 0.3s;
        }

        .mute-btn:hover, .theme-btn:hover { background: rgba(255,255,255,0.1); transform: scale(1.1); }

        .volume-slider {
            -webkit-appearance: none;
            width: 80px;
            height: 3px;
            background: var(--border-color);
            border-radius: 5px;
            outline: none;
        }

        .volume-slider::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 10px;
            height: 10px;
            background: var(--text-color);
            border-radius: 50%;
            cursor: pointer;
        }

        /* СТИЛЬНАЯ КНОПКА ТЕМЫ БЕЗ СМАЙЛИКОВ */
        .theme-btn {
            background: none; border: none;
            width: 35px; height: 35px;
            display: flex; align-items: center; justify-content: center;
            cursor: pointer; border-radius: 50%;
            transition: 0.3s;
        }

    </style>
</head>
<body>

    <canvas id="rainCanvas"></canvas>
    
    <audio id="bgMusic" src="music.mp3" loop autoplay></audio>

    <div class="container">
        <div class="header">
            <h1>Lobedron Hub</h1>
            <p>programs</p>
        </div>

        <div class="projects-grid">
            <a href="https://lobedron.github.io/67-stats/" class="project-card">
                <h2>Lob Analytics</h2>
                <p>Профессиональная статистика канала XrayGame. Графики и глубокий анализ данных.</p>
            </a>

            <a href="https://lobedron.github.io/midnight-code/" class="project-card">
                <h2>Midnight Code</h2>
                <p>Удобный редактор кода html, js, css.</p>
            </a>
        </div>
    </div>

    <div class="controls-bar">
        <div class="mute-btn" id="muteBtn" onclick="toggleMute()">
            <svg id="speakerIcon" viewBox="0 0 24 24">
                <path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02zM14 3.23v2.06c2.89.86 5 3.54 5 6.71s-2.11 5.85-5 6.71v2.06c4.01-.91 7-4.49 7-8.77s-2.99-7.86-7-8.77z"/>
            </svg>
        </div>

        <input type="range" id="volSlider" class="volume-slider" min="0" max="100" value="30" oninput="updateVolume()">

        <div style="width: 1px; height: 20px; background: var(--border-color);"></div>

        <button class="theme-btn" onclick="toggleTheme()" title="Сменить тему">
            <svg viewBox="0 0 24 24"><path d="M12 3c.132 0 .263 0 .393.007a9 9 0 0 0 9.592 9.592A9 9 0 1 1 12 3z"></path></svg>
        </button>
    </div>

    <script>
        const audio = document.getElementById('bgMusic');
        const speakerIcon = document.getElementById('speakerIcon');
        const volSlider = document.getElementById('volSlider');

        // Иконки SVG для звука и мута
        const iconSound = 'M3 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02zM14 3.23v2.06c2.89.86 5 3.54 5 6.71s-2.11 5.85-5 6.71v2.06c4.01-.91 7-4.49 7-8.77s-2.99-7.86-7-8.77z';
        const iconMute = 'M16.5 12c0-1.77-1.02-3.29-2.5-4.03v2.21l2.45 2.45c.03-.2.05-.41.05-.63zm2.5 0c0 .94-.2 1.82-.54 2.64l1.51 1.51C20.63 14.91 21 13.5 21 12c0-4.28-2.99-7.86-7-8.77v2.06c2.89.86 5 3.54 5 6.71zM4.27 3L3 4.27 7.73 9H3v6h4l5 5v-6.73l4.25 4.25c-.67.52-1.42.93-2.25 1.18v2.06c1.38-.31 2.63-.95 3.69-1.81L19.73 21 21 19.73l-9-9L4.27 3zM12 4L9.91 6.09 12 8.18V4z';

        // ИНИЦИАЛИЗАЦИЯ ЗВУКА
        audio.volume = volSlider.value / 100;

        // ПОЧИНИЛ ЛОГИКУ МУТА И ГРОМКОСТИ
        let previousVolume = audio.volume;

        function toggleMute() {
            if (audio.volume > 0) {
                previousVolume = audio.volume;
                audio.volume = 0;
                volSlider.value = 0;
                speakerIcon.querySelector('path').setAttribute('d', iconMute);
            } else {
                audio.volume = previousVolume > 0 ? previousVolume : 0.3;
                volSlider.value = audio.volume * 100;
                speakerIcon.querySelector('path').setAttribute('d', iconSound);
            }
            // Попытка сыграть, если заблокировано
            if (audio.paused) audio.play().catch(()=>{});
        }

        function updateVolume() {
            audio.volume = volSlider.value / 100;
            if (audio.volume === 0) {
                speakerIcon.querySelector('path').setAttribute('d', iconMute);
            } else {
                speakerIcon.querySelector('path').setAttribute('d', iconSound);
            }
        }

        // ВЕРНУЛ ПРАВИЛЬНУЮ ЛОГИКУ ДОЖДЯ (ПЛАВНУЮ)
        const canvas = document.getElementById('rainCanvas');
        const ctx = canvas.getContext('2d');
        let drops = [];

        function initRain() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            drops = [];
            for (let i = 0; i < 150; i++) {
                drops.push({
                    x: Math.random() * canvas.width,
                    y: Math.random() * canvas.height,
                    length: Math.random() * 20 + 10,
                    speed: Math.random() * 8 + 4,
                    opacity: Math.random() * 0.3 + 0.1
                });
            }
        }

        function drawRain() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            const isLight = document.documentElement.getAttribute('data-theme') === 'light';
            ctx.strokeStyle = isLight ? 'rgba(0, 0, 0, 0.4)' : 'rgba(255, 255, 255, 0.4)';
            ctx.lineWidth = 1;
            ctx.lineCap = 'round';

            for (let i = 0; i < drops.length; i++) {
                let p = drops[i];
                ctx.beginPath();
                ctx.moveTo(p.x, p.y);
                ctx.lineTo(p.x, p.y + p.length);
                ctx.stroke();

                p.y += p.speed;
                if (p.y > canvas.height) {
                    p.y = -p.length;
                    p.x = Math.random() * canvas.width;
                }
            }
            requestAnimationFrame(drawRain);
        }

        function toggleTheme() {
            const root = document.documentElement;
            if (root.getAttribute('data-theme') === 'light') {
                root.removeAttribute('data-theme');
            } else {
                root.setAttribute('data-theme', 'light');
            }
        }

        window.addEventListener('resize', initRain);
        initRain();
        drawRain();

        // Автоплей (если браузер позволит)
        window.addEventListener('click', () => {
            if (audio.paused) audio.play().catch(()=>{});
        }, { once: true });
    </script>
</body>
</html>
